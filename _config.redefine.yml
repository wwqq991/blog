info:
  title: 西辞的奇思妙想
  subtitle: 记录折腾、教程和一些奇思妙想
  author: 西辞
  url: https://xc-blog.ccwu.cc

defaults:
  favicon: /images/avatar.jpg
  avatar: /images/avatar.jpg

colors:
  primary: "#2f6fed"
  default_mode: light

global:
  content_max_width: 1080px
  sidebar_width: 240px
  hover:
    shadow: true
    scale: false
  scroll_progress:
    bar: false
    percentage: true
  website_counter:
    enable: false
    site_pv: false
    site_uv: false
    post_pv: false
  preloader:
    enable: false
  open_graph:
    enable: true
    image: /images/avatar.jpg
    description: 记录折腾、教程和一些奇思妙想

home_banner:
  enable: true
  style: fixed
  title: 西辞的奇思妙想
  subtitle:
    text:
      - 记录折腾、教程和一些奇思妙想
      - 分享真实用过的东西和踩过的坑
    hitokoto:
      enable: false
    typing_speed: 80
    backing_speed: 50
    starting_delay: 300
    backing_delay: 1600
    loop: true
    smart_backspace: true
  social_links:
    enable: false
    style: default
    links:
      - icon: email
        url: mailto:xc-blog@xczsbz.33mail.com

navbar:
  auto_hide: false
  color:
    left: "#f5f8ff"
    right: "#eef4ff"
    transparency: 30
  links:
    Home:
      path: /
      icon: fa-regular fa-house
    Archives:
      path: /archives
      icon: fa-regular fa-box-archive
    Categories:
      path: /categories
      icon: fa-regular fa-folder-open
    Tags:
      path: /tags
      icon: fa-regular fa-tags

home:
  sidebar:
    enable: true
    position: left
    first_item: info
    announcement: 欢迎来到我的博客
    show_on_mobile: true
    links:
      Archives:
        path: /archives
        icon: fa-regular fa-box-archive
      Categories:
        path: /categories
        icon: fa-regular fa-folder-open
      Tags:
        path: /tags
        icon: fa-regular fa-tags
  article_date_format: YYYY-MM-DD
  excerpt_length: 180
  categories:
    enable: true
    limit: 3
  tags:
    enable: true
    limit: 3

articles:
  style:
    font_size: 17px
    line_height: 1.75
    image_border_radius: 16px
    image_alignment: center
    image_caption: false
    link_icon: true
    delete_mask: false
    title_alignment: left
  word_count:
    enable: false
    count: false
    min2read: false
  author_label:
    enable: false
    auto: false
    list: []
  code_block:
    copy: true
    style: mac
    highlight_theme:
      light: github
      dark: nord
  toc:
    enable: true
    max_depth: 3
    number: false
    expand: true
    init_open: true
  copyright:
    enable: false
  lazyload: true
  recommendation:
    enable: false

comment:
  enable: false

footer:
  runtime: false
  statistics: false
  customize: 西辞的个人博客
